name: GitHub Classroom Autograding

on:
  push:
    branches:
      - welcome-workflow
      - main
  workflow_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check if welcome.yml exists
      id: check_file
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for welcome.yml'
        command: 'test -f .github/workflows/welcome.yml && printf "%s\n" "welcome.yml"'
        input: ''
        expected-output: 'welcome.yml'
        comparison-method: 'included'
        max-score: 1

    - name: Check for workflow name
      id: check_name
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for workflow name'
        command: 'test "${{ steps.actionlint_check.outcome }}" = "success" && grep -Eq "^[[:space:]]*name:" .github/workflows/welcome.yml && printf "%s\n" "name:"'
        input: ''
        expected-output: 'name:'
        comparison-method: 'included'
        max-score: 1

    - name: Check for pull_request event
      id: check_pr
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for pull_request event'
        command: 'grep -Eq "^[[:space:]]*pull_request:" .github/workflows/welcome.yml && printf "%s\n" "pull_request:"'
        input: ''
        expected-output: 'pull_request:'
        comparison-method: 'included'
        max-score: 1

    - name: Check for types filter
      id: check_types
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for types filter'
        command: 'grep -Eq "^[[:space:]]*types:" .github/workflows/welcome.yml && printf "%s\n" "types:"'
        input: ''
        expected-output: 'types:'
        comparison-method: 'included'
        max-score: 1

    - name: Check for permissions
      id: check_permissions
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for permissions'
        command: 'grep -Eq "^[[:space:]]*pull-requests:[[:space:]]*write" .github/workflows/welcome.yml && printf "%s\n" "pull-requests: write"'
        input: ''
        expected-output: 'pull-requests: write'
        comparison-method: 'included'
        max-score: 1

    - name: Check for jobs section
      id: check_jobs
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for jobs section'
        command: 'grep -Eq "^[[:space:]]*jobs:" .github/workflows/welcome.yml && printf "%s\n" "jobs:"'
        input: ''
        expected-output: 'jobs:'
        comparison-method: 'included'
        max-score: 1

    - name: Check for welcome job
      id: check_welcome_job
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for welcome job'
        command: 'grep -Eq "^[[:space:]]*welcome:" .github/workflows/welcome.yml && printf "%s\n" "welcome:"'
        input: ''
        expected-output: 'welcome:'
        comparison-method: 'included'
        max-score: 1

    - name: Check for runs-on
      id: check_runs_on
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for runs-on'
        command: 'grep -Eq "^[[:space:]]*runs-on:[[:space:]]*ubuntu-latest" .github/workflows/welcome.yml && printf "%s\n" "runs-on: ubuntu-latest"'
        input: ''
        expected-output: 'runs-on: ubuntu-latest'
        comparison-method: 'included'
        max-score: 1

    - name: Check for steps section
      id: check_steps
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for steps section'
        command: 'grep -Eq "^[[:space:]]*steps:" .github/workflows/welcome.yml && printf "%s\n" "steps:"'
        input: ''
        expected-output: 'steps:'
        comparison-method: 'included'
        max-score: 1

    - name: Check for gh pr comment
      id: check_gh_pr_comment
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for gh pr comment'
        command: 'grep -Fq "gh pr comment" .github/workflows/welcome.yml && printf "%s\n" "gh pr comment"'
        input: ''
        expected-output: 'gh pr comment'
        comparison-method: 'included'
        max-score: 1

    - name: Check for GITHUB_TOKEN
      id: check_token
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for GITHUB_TOKEN'
        command: 'grep -Eq "^[[:space:]]*GITHUB_TOKEN:" .github/workflows/welcome.yml && printf "%s\n" "GITHUB_TOKEN:"'
        input: ''
        expected-output: 'GITHUB_TOKEN:'
        comparison-method: 'included'
        max-score: 1

    - name: Check for PR_URL
      id: check_pr_url
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: 'Check for PR_URL'
        command: 'grep -Eq "^[[:space:]]*PR_URL:" .github/workflows/welcome.yml && printf "%s\n" "PR_URL:"'
        input: ''
        expected-output: 'PR_URL:'
        comparison-method: 'included'
        max-score: 1

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      with:
        runners: 'check_file,check_name,check_pr,check_types,check_permissions,check_jobs,check_welcome_job,check_runs_on,check_steps,check_gh_pr_comment,check_token,check_pr_url'
      env:
        CHECK_FILE_RESULTS: "${{steps.check_file.outputs.result}}"
        CHECK_NAME_RESULTS: "${{steps.check_name.outputs.result}}"
        CHECK_PR_RESULTS: "${{steps.check_pr.outputs.result}}"
        CHECK_TYPES_RESULTS: "${{steps.check_types.outputs.result}}"
        CHECK_PERMISSIONS_RESULTS: "${{steps.check_permissions.outputs.result}}"
        CHECK_JOBS_RESULTS: "${{steps.check_jobs.outputs.result}}"
        CHECK_WELCOME_JOB_RESULTS: "${{steps.check_welcome_job.outputs.result}}"
        CHECK_RUNS_ON_RESULTS: "${{steps.check_runs_on.outputs.result}}"
        CHECK_STEPS_RESULTS: "${{steps.check_steps.outputs.result}}"
        CHECK_GH_PR_COMMENT_RESULTS: "${{steps.check_gh_pr_comment.outputs.result}}"
        CHECK_TOKEN_RESULTS: "${{steps.check_token.outputs.result}}"
        CHECK_PR_URL_RESULTS: "${{steps.check_pr_url.outputs.result}}"
